scenario: 
  environment: scenarios.example_webots_fire_rescue
  ppa_library_path: "scenarios/example_webots_fire_rescue/ppa_library.csv"
  result_path: "scenarios/example_webots_fire_rescue/results"

agent:
  namespaces: "/Rescue_UGV_1"
  type: "Rescue_UGV"
  behavior_tree_xml: "bt_follower.xml"

bt_runner:
  bt_tick_rate: 10.0 
  bt_visualiser:
    enabled: True       # Set to True to enable BT visualisation, False to disable
    screen_width: 600 
    screen_height: 600 
  profiling_mode: False