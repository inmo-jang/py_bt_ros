#VRML_SIM R2025a utf8
# Target PROTO
# - status: 0=Unchecked (Red), 1=Checked (White)

PROTO Target [
  field SFVec3f    translation  0 0 0.03
  field SFRotation rotation     0 0 1 -1.57
  field SFInt32    status       0
  field MFString   textureUrl   ["../worlds/icons/target_unchecked.png"]
]
{
  Pose {
    translation IS translation
    rotation IS rotation
    children [
      Shape {
        appearance Appearance {
          material Material {
            diffuseColor 1 1 1
            emissiveColor 1 1 1
          }
          texture ImageTexture {
            url IS textureUrl
          }
          textureTransform TextureTransform {
          }
        }
        geometry Plane {
          size 1.5 1.5
        }
      }
    ]
  }
}
